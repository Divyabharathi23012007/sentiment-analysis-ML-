<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Sentiment Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full mx-4">
        <div class="bg-white rounded-xl shadow-lg p-8 text-center">
            <div class="gradient-bg text-white w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-search text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-4">404</h1>
            <h2 class="text-xl font-semibold text-gray-700 mb-4">Page Not Found</h2>
            <p class="text-gray-600 mb-6">
                The page you're looking for doesn't exist or has been moved.
            </p>
            <a href="/" class="inline-flex items-center bg-purple-600 hover:bg-purple-700 text-white font-semibold px-6 py-3 rounded-lg transition-all duration-200">
                <i class="fas fa-home mr-2"></i>
                Go Home
            </a>
        </div>
    </div>
</body>
</html>
